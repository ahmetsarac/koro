# Varsayılan compose: dış internet mümkün (normal bridge).
# Local + internal ağ için: docker-compose.local.yml
#
# API build (SQLX_OFFLINE) .sqlx ister. up --build tek başına .sqlx yoksa api build'i kırabilir.
# Tek komut: ./scripts/up.sh veya PowerShell için aynı akışı docker-compose.local ile scripts/up-local.ps1 kullanın.

services:
  postgres:
    image: postgres:16
    container_name: koro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: koro
      POSTGRES_PASSWORD: koro
      POSTGRES_DB: koro
    ports:
      - "5432:5432"
    volumes:
      - koro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koro -d koro"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16
    container_name: koro-migrate
    volumes:
      - ./db/migrations:/migrations:ro
      - ./scripts/migrate-compose.sh:/migrate-compose.sh:ro
    environment:
      PGHOST: postgres
      PGUSER: koro
      PGPASSWORD: koro
      PGDATABASE: koro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "set -euo pipefail; sed 's/\\r$$//' /migrate-compose.sh | bash -s",
      ]
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: koro-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - koro_minio:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: koro-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/koro-attachments --ignore-existing;
      exit 0;
      "

  sqlx-prepare:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.sqlx
    volumes:
      - ./apps/api:/app
    environment:
      DATABASE_URL: postgres://koro:koro@postgres:5432/koro
    depends_on:
      migrate:
        condition: service_completed_successfully
    entrypoint: ["cargo", "sqlx", "prepare"]
    restart: "no"

  api:
    image: koro-api:latest
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: koro-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://koro:koro@postgres:5432/koro
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      PORT: "3001"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: koro-attachments
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      sqlx-prepare:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  web:
    image: koro-web:latest
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: koro-web
    restart: unless-stopped
    environment:
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  koro_pgdata:
  koro_minio:
