services:
  postgres:
    image: postgres:16
    container_name: koro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: koro
      POSTGRES_PASSWORD: koro
      POSTGRESS_DB: koro
    ports:
      - "5432:5432"
    volumes:
      - koro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koro -d koro"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: koro-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - koro_minio:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: koro-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/koro-attachments --ignore-existing;
      exit 0;
      "

volumes:
  koro_pgdata:
  koro_minio: