services:
  postgres:
    image: postgres:16
    container_name: koro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: koro
      POSTGRES_PASSWORD: koro
      POSTGRESS_DB: koro
    ports:
      - "5432:5432"
    volumes:
      - koro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koro -d koro"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  koro_pgdata: