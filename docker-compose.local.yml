# Yerel stack: uygulama içi “private” ağ (internal) + tarayıcıdan sadece bu makineye port.
#
# sqlx önbelleği compose akışında üretilir (ayrı docker komutu gerekmez):
#   postgres → migrate → sqlx-prepare → api-build → api + web
#
# Tek komut: docker compose -f docker-compose.local.yml up --build -d
#
# Konteyner içi Postgres: TLS yok → sqlx için ?sslmode=disable (aksi halde prepare bağlantısı kırılabilir).
#
# Host erişimi vs konteynerin “internete çıkması” (aynı şey değil):
#   - 127.0.0.1:HOST:CONTAINER (veya Desktop’ta “port binding → localhost only”) → YALNIZCA bu makineden
#       yayınlanan porta bağlanılır; aynı Wi‑Fi’deki başka PC’ler erişemez. Bu GİRİŞ tarafını sıkılaştırır;
#       konteynerin içeriden curl ile dış siteye gitmesini BLOKE ETMEZ.
#   - internal: true → bridge üzerinden dış WAN’a route yok; konteyner çıkışı engellenir. Desktop’ta api+web
#       için published port + tamamen internal bazen tarayıcıdan erişimi kırar; o yüzden koro_publish
#       normal bridge (internal değil) — api/web için teorik outbound mümkün. postgres/minio yalnız
#       koro_local (internal) → onlar WAN’a çıkamaz.
#   - api + web WAN çıkışı: scripts/container-block-wan-egress.sh (iptables) + cap_add NET_ADMIN.
#       Host→127.0.0.1:3000/3001 docker-proxy ile kalır; konteyner içi outbound public IP REJECT.
#   - sqlx-prepare + api-build: yalnız çalışırken koro_egress → crates.io.
#
# İçeride dinleme: Next standalone HOSTNAME=0.0.0.0; API zaten 0.0.0.0 (Rust). Böylece host→container
# trafiği port map ile içeri girer.

networks:
  koro_local:
    driver: bridge
    internal: true
  # api + web: host portları (Docker Desktop). internal değil — aksi halde tarayıcıdan erişim sık kırılır.
  # Giriş sıkılığı: alttaki ports satırları 127.0.0.1 ile (Desktop “localhost only” ile aynı fikir).
  koro_publish:
    driver: bridge
  # sqlx-prepare + api-build: cargo / crates.io (runtime api bu ağa bağlı değil)
  koro_egress:
    driver: bridge

services:
  postgres:
    image: postgres:16
    container_name: koro-postgres-local
    restart: unless-stopped
    pull_policy: missing
    networks:
      - koro_local
    environment:
      POSTGRES_USER: koro
      POSTGRES_PASSWORD: koro
      POSTGRES_DB: koro
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - koro_pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koro -d koro"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16
    container_name: koro-migrate-local
    pull_policy: missing
    networks:
      - koro_local
    volumes:
      - ./db/migrations:/migrations:ro
      - ./scripts/migrate-compose.sh:/migrate-compose.sh:ro
    environment:
      PGHOST: postgres
      PGUSER: koro
      PGPASSWORD: koro
      PGDATABASE: koro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "set -euo pipefail; sed 's/\\r$$//' /migrate-compose.sh | bash -s",
      ]
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: koro-minio-local
    restart: unless-stopped
    pull_policy: missing
    networks:
      - koro_local
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - koro_minio_local:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: koro-minio-init-local
    pull_policy: missing
    networks:
      - koro_local
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/koro-attachments --ignore-existing;
      exit 0;
      "

  sqlx-prepare:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.sqlx
    pull_policy: missing
    networks:
      koro_local:
      koro_egress:
    volumes:
      - ./apps/api:/app
      - api_cargo_registry_local:/usr/local/cargo/registry
      - api_cargo_git_local:/usr/local/cargo/git
    environment:
      DATABASE_URL: postgres://koro:koro@postgres:5432/koro?sslmode=disable
      RUST_BACKTRACE: "1"
    depends_on:
      migrate:
        condition: service_completed_successfully
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'set -eu; cd /app; if [ -f .env ]; then mv .env .env.koro_prepare_bak; trap "mv .env.koro_prepare_bak .env 2>/dev/null || true" EXIT; fi; echo "sqlx-prepare rustc:$$(rustc -V) cargo:$$(cargo -V)"; cargo sqlx prepare --database-url "$$DATABASE_URL" || { echo "sqlx prepare basarisiz; .sqlx:"; ls -la .sqlx 2>/dev/null || true; exit 1; }; echo "sqlx-prepare tamam; .sqlx:"; ls -la .sqlx',
      ]
    restart: "no"

  api-build:
    image: rust:1-bookworm
    container_name: koro-api-build-local
    pull_policy: missing
    working_dir: /app
    networks:
      koro_local:
      koro_egress:
    volumes:
      - ./apps/api:/app
      - api_cargo_registry_local:/usr/local/cargo/registry
      - api_cargo_git_local:/usr/local/cargo/git
    environment:
      SQLX_OFFLINE: "true"
    depends_on:
      sqlx-prepare:
        condition: service_completed_successfully
    # Docker bazen eksik dosya mount'unda host'ta target/release/api dizini yaratır; cargo ikili yazamaz (EISDIR).
    command:
      [
        "/bin/sh",
        "-c",
        'set -eu; cd /app; if [ -d target/release/api ]; then rm -rf target/release/api; fi; exec cargo build --release',
      ]
    restart: "no"

  api:
    image: koro-api:local-runtime
    build:
      context: ./apps/api
      dockerfile: Dockerfile.local-runtime
    container_name: koro-api-local
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      koro_local:
      koro_publish:
    volumes:
      - ./scripts/container-block-wan-egress.sh:/usr/local/bin/container-block-wan-egress.sh:ro
      # Tek dosya mount: kaynak yoksa Docker dizin yaratır ve build kırılır; tüm release/ kullan.
      - ./apps/api/target/release:/release:ro
    entrypoint: ["/usr/local/bin/container-block-wan-egress.sh"]
    command: ["/release/api"]
    environment:
      DATABASE_URL: postgres://koro:koro@postgres:5432/koro?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      PORT: "3001"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: koro-attachments
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      api-build:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  web:
    image: koro-web:local
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: koro-web-local
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      koro_local:
      koro_publish:
    volumes:
      - ./scripts/container-block-wan-egress.sh:/usr/local/bin/container-block-wan-egress.sh:ro
    entrypoint: ["/usr/local/bin/container-block-wan-egress.sh"]
    command: ["node", "server.js"]
    environment:
      # api ile aynı olmalı (proxy JWT doğrulaması). Proje kökünde .env ile ${JWT_SECRET} verilebilir.
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      # Docker HOSTNAME'i konteyner id yapar; Next standalone server.js buna göre dinler — host:3000 kırılır.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    # Tarayıcı: http://127.0.0.1:3000 veya http://localhost:3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  koro_pgdata_local:
  koro_minio_local:
  api_cargo_registry_local:
  api_cargo_git_local:
